name: Fetch Google Calendar ICS

on:
  schedule:
    - cron: '0 * * * *' # hourly
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/fetch-calendar.yml'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch public ICS
        run: |
          set -e
          ICS_URL="https://calendar.google.com/calendar/ical/cyber.saguaros%40gmail.com/public/basic.ics"
          mkdir -p calendar
          curl -fsSL "$ICS_URL" -o calendar/calendar.ics
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add calendar/calendar.ics || true
          if git diff --cached --quiet; then
            echo "No changes to calendar.ics"
          else
            git commit -m "chore(calendar): update calendar.ics" || true
            git push
          fi
