<!DOCTYPE html>
<html lang="en-us">
<head>
	<meta charset="utf-8">
	<title>Writeup</title>

	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<meta name="description" content="CTF Writeup">
	<meta name="author" content="Cyber Saguaros">

	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Droid+Serif:400|Josefin+Sans:300,400,600,700">
	<link rel="stylesheet" href="/plugins/bootstrap/bootstrap.min.css">
	<link rel="stylesheet" href="/plugins/themefisher-font/themefisher-font.min.css">
	<link rel="stylesheet" href="/scss/style.min.css" media="screen">

	<!-- Marked.js for markdown rendering -->
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

	<style>
		body {
			background:
				radial-gradient(circle at top, rgba(203, 166, 247, 0.18), transparent 34%),
				linear-gradient(180deg, #1e1e2e 0%, #181825 100%);
			color: #cdd6f4;
			font-family: 'Droid Serif', 'Josefin Sans', sans-serif;
		}

		header.navigation {
			background-color: #181825;
		}

		.writeup-container {
			max-width: 900px;
			margin: 3rem auto;
			background: rgba(24, 24, 37, 0.94);
			border: 1px solid rgba(203, 166, 247, 0.18);
			border-radius: 16px;
			padding: 2rem;
			box-shadow: 0 16px 50px rgba(0, 0, 0, 0.28);
		}

		.markdown-content {
			color: rgba(205, 214, 244, 0.86);
			line-height: 1.8;
		}

		.markdown-content h1 {
			color: #f5e0dc;
			font-size: 2.2rem;
			margin: 2rem 0 1rem;
			line-height: 1.2;
			border-bottom: 2px solid rgba(203, 166, 247, 0.2);
			padding-bottom: 1rem;
		}

		.markdown-content h1:first-child {
			margin-top: 0;
		}

		.markdown-content h2 {
			color: #f5e0dc;
			font-size: 1.6rem;
			margin: 2rem 0 1rem;
			border-bottom: 1px solid rgba(203, 166, 247, 0.12);
			padding-bottom: 0.5rem;
		}

		.markdown-content h3 {
			color: #cba6f7;
			font-size: 1.3rem;
			margin: 1.5rem 0 0.8rem;
		}

		.markdown-content h4 {
			color: #94e2d5;
			font-size: 1.1rem;
			margin: 1.2rem 0 0.6rem;
		}

		.markdown-content p {
			margin-bottom: 1rem;
		}

		.markdown-content strong {
			color: #f5e0dc;
			font-weight: 700;
		}

		.markdown-content em {
			color: #94e2d5;
			font-style: italic;
		}

		.markdown-content code {
			background: rgba(0, 0, 0, 0.3);
			color: #94e2d5;
			padding: 0.2rem 0.5rem;
			border-radius: 4px;
			font-family: 'Courier New', monospace;
			font-size: 0.9rem;
		}

		.markdown-content pre {
			background: rgba(0, 0, 0, 0.4);
			border-left: 3px solid #cba6f7;
			padding: 1rem;
			border-radius: 6px;
			overflow-x: auto;
			margin: 1rem 0;
		}

		.markdown-content pre code {
			background: none;
			color: #89b4fa;
			padding: 0;
			border-radius: 0;
		}

		.markdown-content ul, .markdown-content ol {
			margin: 1rem 0 1rem 2rem;
		}

		.markdown-content li {
			margin-bottom: 0.5rem;
		}

		.markdown-content blockquote {
			border-left: 4px solid #cba6f7;
			padding-left: 1rem;
			margin-left: 0;
			color: rgba(205, 214, 244, 0.76);
			font-style: italic;
		}

		.markdown-content hr {
			border: none;
			border-top: 1px solid rgba(203, 166, 247, 0.18);
			margin: 2rem 0;
		}

		.markdown-content a {
			color: #89b4fa;
			text-decoration: none;
			transition: color 200ms ease;
		}

		.markdown-content a:hover {
			color: #cba6f7;
			text-decoration: underline;
		}

		.markdown-content table {
			border-collapse: collapse;
			width: 100%;
			margin: 1rem 0;
		}

		.markdown-content table th,
		.markdown-content table td {
			border: 1px solid rgba(203, 166, 247, 0.2);
			padding: 0.75rem;
			text-align: left;
		}

		.markdown-content table th {
			background: rgba(203, 166, 247, 0.1);
			color: #f5e0dc;
			font-weight: 700;
		}

		.back-link {
			display: inline-block;
			margin-bottom: 2rem;
			color: #cba6f7;
			text-decoration: none;
			transition: color 180ms ease;
		}

		.back-link:hover {
			color: #d8bafc;
		}

		.loading {
			text-align: center;
			padding: 3rem 1rem;
			color: rgba(205, 214, 244, 0.66);
		}

		.error {
			background: rgba(240, 113, 120, 0.1);
			border: 1px solid rgba(240, 113, 120, 0.3);
			color: #f07178;
			padding: 1.5rem;
			border-radius: 8px;
			margin: 2rem 0;
		}

		footer.footer {
			background-color: #1e1e2e;
			color: #cdd6f4;
			padding: 2rem 1rem;
			text-align: center;
			margin-top: 3rem;
			border-top: 1px solid rgba(203, 166, 247, 0.12);
		}

		@media (max-width: 768px) {
			.writeup-container {
				margin: 1rem;
				padding: 1.5rem;
			}

			.markdown-content h1 {
				font-size: 1.6rem;
			}

			.markdown-content h2 {
				font-size: 1.3rem;
			}
		}
	</style>
</head>

<body>
	<header class="navigation" style="background-color: #1e1e2e;">
		<div class="container">
			<nav class="navbar navbar-expand-lg navbar-dark">
				<a class="navbar-brand" href="/">
					<img src="/images/logo.png" alt="Cyber Saguaros" style="max-height: 40px;">
				</a>
				<div class="collapse navbar-collapse">
					<ul class="navbar-nav ml-auto">
						<li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
						<li class="nav-item"><a class="nav-link" href="/calendar/">Calendar</a></li>
						<li class="nav-item"><a class="nav-link" href="/presentations/">Presentations</a></li>
						<li class="nav-item"><a class="nav-link" href="/writeups/">Writeups</a></li>
					</ul>
				</div>
			</nav>
		</div>
	</header>

	<main>
		<div class="container">
			<a href="/writeups/" class="back-link">← Back to Writeups</a>

			<div class="writeup-container">
				<div id="markdown-content" class="markdown-content">
					<div class="loading">Loading writeup...</div>
				</div>
			</div>
		</div>
	</main>

	<footer class="footer">
		<div class="container">
			<p>&copy; 2024-2026 Cyber Saguaros. All rights reserved.</p>
		</div>
	</footer>

	<script>
		// Get the markdown file from URL parameter
		const params = new URLSearchParams(window.location.search);
		const mdFile = params.get('file') || 'example-writeup.md';

		// Configure marked options
		marked.setOptions({
			breaks: true,
			gfm: true,
		});

		// Load and render the markdown file
		fetch(`/writeups/md-writeups/${mdFile}`)
			.then(response => {
				if (!response.ok) {
					throw new Error('Writeup not found');
				}
				return response.text();
			})
			.then(markdown => {
				const html = marked.parse(markdown);
				document.getElementById('markdown-content').innerHTML = html;
				
				// Update page title from first h1
				const h1 = document.querySelector('.markdown-content h1');
				if (h1) {
					document.title = h1.textContent + ' - Writeup';
				}
			})
			.catch(error => {
				document.getElementById('markdown-content').innerHTML = 
					`<div class="error"><strong>Error:</strong> ${error.message}</div>`;
			});
	</script>
	<script src="/plugins/jquery/jquery.js"></script>
	<script src="/plugins/bootstrap/bootstrap.min.js"></script>
</body>

</html>
