<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Saguaros Calendar</title>

  <!-- Bootstrap & site styles -->
  <link rel="stylesheet" href="/plugins/bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="/plugins/themefisher-font/themefisher-font.min.css" />
  <link rel="stylesheet" href="/plugins/slick/slick.min.css" />
  <link rel="stylesheet" href="/scss/style.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Droid+Serif:400|Josefin+Sans:300,400,600,700" />

  <style>
    body {
      background-color: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Droid Serif', 'Josefin Sans', sans-serif;
    }

    header.navigation {
      background-color: #1e1e2e;
    }

    h1 {
      color: #cba6f7;
      text-align: center;
      margin-bottom: 2rem;
    }

    #calendar {
      max-width: 1000px;
      margin: 0 auto;
      background-color: #181825;
      padding: 1rem;
      border-radius: 16px;
      box-shadow: 0 0 25px #cba6f7a0;
    }

    .event-details-card {
      max-width: 1000px;
      margin: 1.5rem auto 0;
      background-color: #181825;
      border: 1px solid #313244;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 0 18px rgba(203, 166, 247, 0.18);
      text-align: left;
    }

    .event-details-label {
      color: #94e2d5;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.78rem;
      margin-bottom: 0.65rem;
    }

    .event-details-title {
      color: #f5e0dc;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .event-details-meta {
      color: rgba(205, 214, 244, 0.9);
      margin-bottom: 0.9rem;
    }

    .event-details-body {
      color: rgba(205, 214, 244, 0.82);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .event-details-empty {
      color: rgba(205, 214, 244, 0.64);
      margin: 0;
    }

    .fc {
      --fc-page-bg-color: transparent;
      --fc-border-color: #313244;
      --fc-neutral-bg-color: #181825;
      --fc-list-event-hover-bg-color: rgba(203, 166, 247, 0.12);
      --fc-today-bg-color: rgba(203, 166, 247, 0.08);
      --fc-highlight-color: rgba(203, 166, 247, 0.16);
      color: #cdd6f4;
    }

    .fc .fc-scrollgrid,
    .fc .fc-scrollgrid-section > td,
    .fc .fc-theme-standard td,
    .fc .fc-theme-standard th {
      background-color: #181825 !important;
      border-color: #313244 !important;
    }

    .fc .fc-toolbar-title {
      color: #cdd6f4 !important;
    }

    .fc .fc-button {
      background-color: #cba6f7;
      border: 0;
      color: #11111b;
      box-shadow: none;
      text-transform: capitalize;
    }

    .fc .fc-button:hover,
    .fc .fc-button:focus {
      background-color: #d8bafc;
      color: #11111b;
      box-shadow: none;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active {
      background-color: #89b4fa;
      color: #11111b;
    }

    .fc .fc-daygrid-day-number,
    .fc .fc-col-header-cell-cushion {
      color: #cdd6f4;
      text-decoration: none;
    }

    .fc .fc-daygrid-event {
      border: 0;
      border-radius: 6px;
      padding: 0 4px;
      font-weight: 600;
      box-shadow: none;
    }

    .fc .fc-event-main {
      color: #11111b;
    }

    .fc .fc-timegrid-event .fc-event-main {
      color: #11111b;
    }

    .fc .fc-daygrid-day.fc-day-today {
      background: rgba(203, 166, 247, 0.08);
    }

    .fc .fc-event {
      background-color: #cba6f7;
    }

    .fc .fc-event:hover {
      filter: brightness(0.95);
    }

    .fc .fc-popover {
      background: #181825;
      border-color: rgba(203, 166, 247, 0.2);
    }

    .fc .fc-timegrid-slot,
    .fc .fc-timegrid-axis {
      color: rgba(205, 214, 244, 0.75);
    }

    .fc .fc-list {
      border-color: #313244;
    }

    footer.footer {
      background-color: #1e1e2e;
      color: #cdd6f4;
      padding: 2rem 1rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <header class="navigation" style="background-color: #1e1e2e;">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="/">
          <img src="/images/logo.png" alt="Cyber Saguaros" style="max-height: 40px;">
        </a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" href="/contact/">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="/calendar/">Calendar</a></li>
            <li class="nav-item"><a class="nav-link" href="/presentations/">Presentations</a></li>
            <li class="nav-item"><a class="nav-link" href="/writeups/">Writeups</a></li>
          </ul>
        </div>
      </nav>
    </div>
  </header>

  <!-- Calendar -->
  <section class="section text-center" style="padding: 2rem 1rem;">
    <div class="container">
      <h1>Cyber Saguaros Club Calendar</h1>
      <div id="calendar"></div>
      <div class="event-details-card" id="event-details">
        <div class="event-details-label">Event Details</div>
        <p class="event-details-empty">Click an event to view its details here.</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 Cyber Saguaros. All rights reserved.</p>
    </div>
  </footer>

  <!-- Site Scripts -->
  <script src="/plugins/jquery/jquery.js"></script>
  <script src="/plugins/bootstrap/bootstrap.min.js"></script>
  <script src="/plugins/slick/slick.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/luxon3@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.8/index.global.min.js"></script>
  <script src="/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const TIMEZONE = 'America/Phoenix';
      const FEED_URL = '/calendar/calendar.ics';
      const DEFAULT_DETAILS = '<div class="event-details-label">Event Details</div><p class="event-details-empty">Click an event to view its details here.</p>';

      const calendarEl = document.getElementById('calendar');
      const detailsEl = document.getElementById('event-details');

      function formatRange(event) {
        if (event.allDay) {
          const opts = { month: 'short', day: 'numeric', year: 'numeric', timeZone: TIMEZONE };
          const startLabel = event.start.toLocaleDateString('en-US', opts);
          if (!event.end) return startLabel;
          // FullCalendar reports exclusive end for all-day events; subtract a day for display.
          const inclusiveEnd = new Date(event.end.getTime() - 24 * 60 * 60 * 1000);
          const endLabel = inclusiveEnd.toLocaleDateString('en-US', opts);
          return startLabel === endLabel ? startLabel : startLabel + ' – ' + endLabel;
        }

        return new Intl.DateTimeFormat('en-US', {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit', timeZone: TIMEZONE
        }).format(event.start);
      }

      function renderDetails(event) {
        const props = event.extendedProps || {};
        const description = props.description
          ? String(props.description).replace(/\\n/g, '<br />').replace(/\n/g, '<br />')
          : '';

        const lines = [];
        lines.push('<div class="event-details-label">' + (event.allDay ? 'All day event' : 'Scheduled event') + '</div>');
        lines.push('<div class="event-details-title">' + event.title + '</div>');
        lines.push('<div class="event-details-meta">' + formatRange(event) + '</div>');
        if (props.location) {
          lines.push('<div class="event-details-body"><strong>Location:</strong> ' + props.location + '</div>');
        }
        if (description) {
          lines.push('<div class="event-details-body" style="margin-top: 0.75rem;">' + description + '</div>');
        }
        detailsEl.innerHTML = lines.join('');
      }

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        themeSystem: 'standard',
        height: 'auto',
        timeZone: TIMEZONE,
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: {
          url: FEED_URL,
          format: 'ics',
          failure: function () {
            detailsEl.innerHTML = '<div class="event-details-label">Calendar unavailable</div><p class="event-details-empty">We could not load the Google Calendar feed right now.</p>';
          }
        },
        eventClick: function (info) {
          info.jsEvent.preventDefault();
          renderDetails(info.event);
        },
        datesSet: function () {
          detailsEl.innerHTML = DEFAULT_DETAILS;
        }
      });

      calendar.render();
    });
  </script>
</body>
</html>
